<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>florr3d</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1ea761; }
    body { font-family: 'Ubuntu', sans-serif; font-weight: 700; }
    #app canvas { display: block; }

    .stroke { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
                            0 -2px 0 #000, 0 2px 0 #000, -2px 0 0 #000, 2px 0 0 #000; color: #fff; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #hud > * { pointer-events: auto; }

    /* top-left status */
    #status { position: absolute; top: 14px; left: 14px; width: 260px; pointer-events: none; }
    #status .label { font-size: 15px; margin-bottom: 3px; }
    .barwrap { background: rgba(0,0,0,0.55); border: 3px solid #222; border-radius: 10px;
               height: 20px; overflow: hidden; margin-bottom: 8px; }
    .barfill { height: 100%; border-radius: 6px; transition: width 0.15s ease-out; }
    #hpfill { background: #75dd34; width: 100%; }
    #xpfill { background: #e8c85a; width: 0%; }

    /* controls help */
    #help { position: absolute; top: 14px; right: 14px; text-align: right; font-size: 13px;
            line-height: 1.55; opacity: 0.9; pointer-events: none; }

    /* loadout */
    #loadout { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
               display: flex; flex-direction: column; align-items: center; gap: 7px; }
    .petalrow { display: flex; gap: 7px; }
    .slot { width: 62px; height: 62px; border-radius: 9px; background: rgba(200,200,200,0.85);
            border: 4px solid rgba(85,85,85,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; position: relative;
            transition: transform 0.08s; }
    .slot:hover { transform: scale(1.07); }
    .petalrow.secondary .slot { width: 48px; height: 48px; border-width: 3px; }
    .slot .dot { width: 22px; height: 22px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.35); }
    .petalrow.secondary .slot .dot { width: 16px; height: 16px; }
    .slot .pname { font-size: 10px; margin-top: 2px; color: #000; opacity: 0.75; }
    .petalrow.secondary .slot .pname { font-size: 8px; }
    .slot .hotkey { position: absolute; top: 1px; right: 4px; font-size: 10px; color: rgba(0,0,0,0.4); }
    .slot.cooling { filter: brightness(0.5); }
    .slot.empty .pname { opacity: 0.35; font-size: 14px; }

    /* inventory */
    #invwrap { position: absolute; bottom: 14px; left: 14px; max-width: 300px; }
    #invtitle { font-size: 14px; margin-bottom: 5px; }
    #inventory { display: flex; flex-wrap: wrap; gap: 5px; }
    .invtile { width: 46px; height: 46px; border-radius: 8px; border: 3px solid rgba(0,0,0,0.35);
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               cursor: pointer; position: relative; }
    .invtile.selected { outline: 3px solid #fff; transform: scale(1.1); }
    .invtile .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.35); }
    .invtile .pname { font-size: 8px; color: #000; opacity: 0.75; }
    .invtile .count { position: absolute; top: -6px; right: -6px; background: #222; color: #fff;
                      font-size: 10px; border-radius: 8px; padding: 1px 5px; }
    #invhint { font-size: 11px; margin-top: 5px; opacity: 0.85; }

    /* death overlay */
    #death { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: none;
             align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
    #death.show { display: flex; }
    #death .big { font-size: 44px; }
    #death .small { font-size: 18px; }

    /* toasts */
    #toasts { position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
              display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
    .toast { font-size: 18px; animation: toastfade 2.5s forwards; }
    @keyframes toastfade { 0% { opacity: 0; transform: translateY(8px); }
      12% { opacity: 1; transform: translateY(0); } 75% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="status">
      <div class="label stroke" id="lvltext">Lvl 1</div>
      <div class="barwrap"><div class="barfill" id="hpfill"></div></div>
      <div class="barwrap" style="height:14px"><div class="barfill" id="xpfill"></div></div>
    </div>
    <div id="help" class="stroke">
      Move — mouse<br/>
      Attack / Defend — left / right click<br/>
      Swap petal — [1..5] &nbsp; Swap rows — [R]<br/>
      Rotation speed — [Q]/[E]<br/>
      First person (WASD) — [F]
    </div>
    <div id="loadout">
      <div class="petalrow primary" id="rowPrimary"></div>
      <div class="petalrow secondary" id="rowSecondary"></div>
    </div>
    <div id="invwrap">
      <div id="invtitle" class="stroke">Inventory</div>
      <div id="inventory"></div>
      <div id="invhint" class="stroke">Click a petal, then a slot to equip</div>
    </div>
    <div id="toasts"></div>
    <div id="death">
      <div class="big stroke">You died</div>
      <div class="small stroke" id="deathtimer">Respawning…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
