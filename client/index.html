<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>florr3d</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1ea761; }
    body { font-family: 'Ubuntu', sans-serif; font-weight: 700; }
    #app canvas { display: block; }

    .stroke { text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
                            0 -2px 0 #000, 0 2px 0 #000, -2px 0 0 #000, 2px 0 0 #000; color: #fff; }

    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #hud > * { pointer-events: auto; }

    /* top-left status: florr-style pill bars on a dark track */
    #status { position: absolute; top: 14px; left: 14px; width: 270px; pointer-events: none; }
    #status .label { font-size: 16px; margin-bottom: 4px; }
    .barwrap { background: rgba(15,20,15,0.5); border-radius: 999px; height: 24px;
               padding: 4px; margin-bottom: 8px;
               box-shadow: inset 0 1px 3px rgba(0,0,0,0.4), 0 1px 0 rgba(255,255,255,0.12); }
    .barwrap.xp { height: 17px; padding: 3px; }
    .bartrack { position: relative; height: 100%; }
    .barfill, .barghost { position: absolute; top: 0; left: 0; height: 100%;
                          border-radius: 999px; }
    .barfill { transition: width 0.15s ease-out; }
    /* red ghost lags behind the green fill to show recent damage, like mob bars */
    .barghost { background: #d43a2f; transition: width 0.6s ease 0.25s; width: 100%; }
    #hpfill { background: linear-gradient(180deg, #8bee52, #63cd28); width: 100%; }
    #xpfill { background: linear-gradient(180deg, #ffe763, #efc73c); width: 0%; }

    /* controls help */
    #help { position: absolute; top: 14px; right: 14px; text-align: right; font-size: 13px;
            line-height: 1.55; opacity: 0.9; pointer-events: none; }

    /* loadout */
    #loadout { position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
               display: flex; flex-direction: column; align-items: center; gap: 7px; }
    .petalrow { display: flex; gap: 7px; }
    .slot { width: 64px; height: 64px; border-radius: 9px; background: rgba(0,0,0,0.16);
            border: 5px solid rgba(0,0,0,0.13); display: flex; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer; position: relative;
            transition: transform 0.08s; overflow: hidden; }
    .slot:hover { transform: scale(1.07); }
    .slot:active { transform: scale(0.98); }
    .slot.empty { cursor: default; }
    .slot.empty:hover, .slot.empty:active { transform: none; }
    .petalrow.secondary .slot { width: 50px; height: 50px; border-width: 4px; border-radius: 7px; }
    /* reload pie: conic sweep that shrinks clockwise as the petal recharges */
    .slot .cdpie { position: absolute; inset: 0; pointer-events: none; }
    /* the source icons have a lot of built-in padding around the icon+label,
       so scale past 100% and let the slot's overflow:hidden crop it in tight */
    .slot .picon { width: 100%; height: 100%; object-fit: contain; transform: scale(1.55);
                   pointer-events: none; }
    .slot .dot { width: 22px; height: 22px; border-radius: 50%; border: 3px solid rgba(0,0,0,0.35); }
    .petalrow.secondary .slot .dot { width: 16px; height: 16px; }
    .slot .pname { font-size: 10px; margin-top: 2px; color: #000; opacity: 0.75; }
    .petalrow.secondary .slot .pname { font-size: 8px; }
    .slot .hotkey { position: absolute; top: 2px; right: 5px; font-size: 11px; color: rgba(0,0,0,0.45); }

    /* inventory */
    #invwrap { position: absolute; bottom: 14px; left: 14px; max-width: 300px; }
    #invtitle { font-size: 14px; margin-bottom: 5px; }
    #inventory { display: flex; flex-wrap: wrap; gap: 5px; }
    .invtile { width: 48px; height: 48px; border-radius: 8px; border: 4px solid rgba(0,0,0,0.35);
               display: flex; flex-direction: column; align-items: center; justify-content: center;
               cursor: pointer; position: relative; overflow: hidden;
               transition: transform 0.08s; }
    .invtile:hover { transform: scale(1.08); }
    .invtile.selected { outline: 3px solid #fff; transform: scale(1.12);
                        box-shadow: 0 0 10px rgba(255,255,255,0.6); }
    .invtile .picon { width: 100%; height: 100%; object-fit: contain; transform: scale(1.55);
                      pointer-events: none; }
    .invtile .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.35); }
    .invtile .pname { font-size: 8px; color: #000; opacity: 0.75; }
    .invtile .count { position: absolute; top: -6px; right: -6px; background: #222; color: #fff;
                      font-size: 10px; border-radius: 8px; padding: 1px 5px; }
    #invhint { font-size: 11px; margin-top: 5px; opacity: 0.85; }

    /* quality toggle */
    #quality { position: absolute; bottom: 14px; right: 14px; font-size: 14px;
               background: rgba(15,20,15,0.6); padding: 6px 14px; border-radius: 999px;
               cursor: pointer; transition: transform 0.08s; }
    #quality:hover { transform: scale(1.06); }

    /* death overlay */
    #death { position: absolute; inset: 0; background: rgba(0,0,0,0.55); display: none;
             align-items: center; justify-content: center; flex-direction: column; gap: 10px; }
    #death.show { display: flex; }
    #death .big { font-size: 44px; }
    #death .small { font-size: 18px; }

    /* toasts */
    #toasts { position: absolute; top: 90px; left: 50%; transform: translateX(-50%);
              display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none; }
    .toast { font-size: 16px; background: rgba(15,20,15,0.6); padding: 5px 16px;
             border-radius: 999px; animation: toastfade 2.5s forwards; }
    @keyframes toastfade { 0% { opacity: 0; transform: translateY(8px); }
      12% { opacity: 1; transform: translateY(0); } 75% { opacity: 1; } 100% { opacity: 0; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <div id="status">
      <div class="label stroke" id="lvltext">Lvl 1</div>
      <div class="barwrap">
        <div class="bartrack">
          <div class="barghost" id="hpghost"></div>
          <div class="barfill" id="hpfill"></div>
        </div>
      </div>
      <div class="barwrap xp"><div class="bartrack"><div class="barfill" id="xpfill"></div></div></div>
    </div>
    <div id="help" class="stroke">
      Move — mouse<br/>
      Attack / Defend — left / right click<br/>
      Swap petal — [1..5] &nbsp; Swap rows — [R]<br/>
      Rotation speed — [Q]/[E]<br/>
      First person (WASD) — [F]
    </div>
    <div id="loadout">
      <div class="petalrow primary" id="rowPrimary"></div>
      <div class="petalrow secondary" id="rowSecondary"></div>
    </div>
    <div id="invwrap">
      <div id="invtitle" class="stroke">Inventory</div>
      <div id="inventory"></div>
      <div id="invhint" class="stroke">Click a petal, then a slot to equip</div>
    </div>
    <div id="quality" class="stroke"></div>
    <div id="toasts"></div>
    <div id="death">
      <div class="big stroke">You died</div>
      <div class="small stroke" id="deathtimer">Respawning…</div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
